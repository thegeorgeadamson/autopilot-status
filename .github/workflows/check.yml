name: Uptime check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'targets.json'
      - 'scripts/**'
      - '.github/workflows/check.yml'

permissions:
  contents: write

concurrency:
  group: uptime-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run checks
        id: checks
        continue-on-error: true
        run: node scripts/check.mjs

      - name: Commit results
        run: |
          git config user.name "uptime-bot"
          git config user.email "uptime-bot@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "uptime: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Pull-then-push loop to handle the rare race when two scheduled
          # runs overlap and one gets in just before us.
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            git pull --rebase --autostash
          done
          git push

      - name: Fail if any target is down
        if: steps.checks.outcome == 'failure'
        run: |
          echo "One or more targets failed. See the 'Run checks' step above."
          exit 1
