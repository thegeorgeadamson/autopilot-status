<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#f6f7fb" />
  <title>Autopilot status</title>
  <meta name="description" content="Live status for Autopilot app, site, backend, and AI companion." />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    :root {
      --bg: #f6f7fb;
      --surface: #ffffff;
      --ink: #0a0a0a;
      --ink-soft: #525252;
      --ink-mute: #a3a3a3;
      --border: rgba(10, 10, 10, 0.08);
      --up: #059669;
      --up-soft: #d1fae5;
      --down: #dc2626;
      --down-soft: #fee2e2;
      --warn: #d97706;
      --warn-soft: #fef3c7;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { background: var(--bg); }
    body {
      background-color: var(--bg);
      background-image: linear-gradient(180deg, #fbfcff 0%, #ffffff 44%, #f6f7fb 100%);
      background-attachment: fixed;
      background-repeat: no-repeat;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100svh;
      overflow-x: clip;
      letter-spacing: 0;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 840px;
      margin: 0 auto;
      padding: 48px 24px 72px;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--ink);
      text-decoration: none;
      transition: opacity 120ms ease;
    }
    .brand:hover { opacity: 0.7; }
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
    }
    .logo svg { width: 16px; height: 16px; display: block; }
    .wordmark {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-soft);
    }

    /* Banner */
    .banner {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.06);
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .banner-dot {
      flex-shrink: 0;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ink-mute);
      box-shadow: 0 0 0 6px rgba(0, 0, 0, 0.04);
    }
    .banner-dot.up    { background: var(--up);   box-shadow: 0 0 0 6px rgba(5, 150, 105, 0.12); }
    .banner-dot.warn  { background: var(--warn); box-shadow: 0 0 0 6px rgba(217, 119, 6, 0.12); }
    .banner-dot.down  { background: var(--down); box-shadow: 0 0 0 6px rgba(220, 38, 38, 0.12); }
    .banner-text { flex: 1; min-width: 0; }
    .banner-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0;
      line-height: 1.2;
    }
    .banner-sub {
      margin-top: 4px;
      font-size: 13px;
      color: var(--ink-soft);
    }

    /* Range selector */
    .range-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 24px 0 16px;
      flex-wrap: wrap;
    }
    .range-label {
      font-size: 12px;
      color: var(--ink-mute);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .range-pills {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 3px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .range-pill {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-soft);
      cursor: pointer;
      letter-spacing: 0;
      transition: background 120ms ease, color 120ms ease;
      font-family: inherit;
    }
    .range-pill:hover { color: var(--ink); }
    .range-pill.active {
      background: var(--ink);
      color: #fff;
    }

    /* Target cards */
    .targets { display: grid; gap: 12px; }

    .card {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      padding: 20px 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
    }
    .card-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .card-name {
      flex: 1;
      min-width: 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 11px;
      color: var(--ink-mute);
      font-variant-numeric: tabular-nums;
    }
    .card-meta strong {
      color: var(--ink-soft);
      font-weight: 500;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
    }
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0;
      background: rgba(0, 0, 0, 0.04);
      color: var(--ink-soft);
    }
    .status-chip.up    { background: var(--up-soft);   color: var(--up); }
    .status-chip.warn  { background: var(--warn-soft); color: var(--warn); }
    .status-chip.down  { background: var(--down-soft); color: var(--down); }
    .status-chip .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* 90-day calendar strip */
    .calendar {
      display: flex;
      gap: 2px;
      height: 8px;
      margin: 4px 0 18px;
    }
    .day {
      flex: 1;
      min-width: 1px;
      border-radius: 2px;
      background: rgba(0, 0, 0, 0.06);
      transition: transform 120ms ease;
    }
    .day.up   { background: var(--up); }
    .day.warn { background: var(--warn); }
    .day.down { background: var(--down); }
    .day.none { background: rgba(0, 0, 0, 0.05); }
    .day:hover { transform: scaleY(1.4); }
    .calendar-foot {
      display: flex;
      justify-content: space-between;
      margin-top: -10px;
      margin-bottom: 16px;
      font-size: 10px;
      color: var(--ink-mute);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    /* Bar chart */
    .bars {
      display: flex;
      gap: 2px;
      align-items: stretch;
      height: 28px;
    }
    .bar {
      flex: 1;
      min-width: 1px;
      border-radius: 2px;
      background: rgba(0, 0, 0, 0.06);
      transition: transform 120ms ease;
    }
    .bar.up    { background: var(--up); }
    .bar.warn  { background: var(--warn); }
    .bar.down  { background: var(--down); }
    .bar.none  { background: rgba(0, 0, 0, 0.06); }
    .bar:hover { transform: scaleY(1.1); }
    .bars-foot {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: var(--ink-mute);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    /* Footer */
    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--ink-mute);
      display: flex;
      flex-wrap: wrap;
      gap: 8px 24px;
      justify-content: space-between;
    }
    footer a {
      color: var(--ink-soft);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    footer a:hover { border-bottom-color: var(--ink-soft); }
    .footer-links {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--ink-mute);
      font-size: 13px;
    }

    @media (max-width: 520px) {
      main { padding: 32px 16px 56px; }
      header { margin-bottom: 32px; }
      .banner { padding: 20px; }
      .banner-title { font-size: 18px; }
      .card { padding: 16px 14px; }
      .card-meta { gap: 10px; flex-wrap: wrap; row-gap: 4px; }
      .bars { gap: 1px; }
      .calendar { gap: 1px; height: 7px; margin-bottom: 14px; }
      .range-bar { gap: 8px; }
      .range-pill { padding: 5px 10px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <a class="brand" href="https://aplt.ai" aria-label="Autopilot — back to the homepage">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 943 943" fill="currentColor" aria-hidden="true">
            <path d="M350.467,157.806 C373.18,120.678 415.153,97.807 460.578,97.807 C506.003,97.807 547.977,120.678 570.689,157.806 L880.241,663.811 C902.954,700.939 902.955,746.684 880.242,783.812 C857.53,820.94 815.555,843.812 770.129,843.812 C666.844,843.812 409.268,844.46 206.475,845.017 C149.658,845.148 97.088,816.644 68.59,770.255 C40.091,723.865 40.0,666.647 68.347,620.175 C169.791,453.795 298.775,242.302 350.467,157.806 ZM444.664,713.813 L696.72,713.813 C708.077,713.813 718.57,708.095 724.249,698.813 C729.926,689.531 729.926,678.094 724.249,668.813 L488.106,282.805 C482.429,273.523 471.934,267.805 460.578,267.805 C449.222,267.805 438.728,273.523 433.05,282.805 L307.025,488.811 C278.633,535.222 278.633,592.401 307.023,638.812 C335.414,685.222 387.883,713.813 444.664,713.813 Z"/>
          </svg>
        </span>
        <span class="wordmark">Autopilot</span>
      </a>
      <span class="pill" style="margin-left:auto">Status</span>
    </header>

    <section class="banner" id="banner">
      <span class="banner-dot" id="bannerDot"></span>
      <div class="banner-text">
        <div class="banner-title" id="bannerTitle">Loading…</div>
        <div class="banner-sub" id="bannerSub">Fetching latest checks.</div>
      </div>
    </section>

    <div class="range-bar" role="tablist" aria-label="Time range">
      <span class="range-label" id="rangeLabel">Last 24 hours</span>
      <div class="range-pills" id="rangePills">
        <button class="range-pill" data-range="1h" type="button">1H</button>
        <button class="range-pill" data-range="6h" type="button">6H</button>
        <button class="range-pill active" data-range="24h" type="button">24H</button>
        <button class="range-pill" data-range="7d" type="button">7D</button>
        <button class="range-pill" data-range="30d" type="button">30D</button>
      </div>
    </div>

    <section class="targets" id="targets" aria-live="polite"></section>

    <footer>
      <span>Checks every minute</span>
      <span class="footer-links">
        <a href="https://app.aplt.ai" target="_blank" rel="noopener">Open app</a>
        <a href="https://github.com/thegeorgeadamson/autopilot-status" target="_blank" rel="noopener">View source</a>
      </span>
    </footer>
  </main>

  <script>
    const fmtTime = (iso) => {
      if (!iso) return '—';
      const d = new Date(iso);
      const now = new Date();
      const sameDay = d.toDateString() === now.toDateString();
      if (sameDay) {
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }
      return d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    };

    const fmtRel = (iso) => {
      if (!iso) return 'never';
      const diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    };

    const STATUS_LABEL = {
      up: 'Operational',
      warn: 'Degraded',
      degraded: 'Degraded',
      down: 'Down',
    };

    function statusClass(s) {
      if (s === 'up') return 'up';
      if (s === 'down') return 'down';
      return 'warn';
    }

    const RANGE_EDGE_LABEL = {
      '1h':  '1h ago',
      '6h':  '6h ago',
      '24h': '24h ago',
      '7d':  '7d ago',
      '30d': '30d ago',
    };

    function renderBars(series, rangeKey) {
      const arr = series ?? [];
      const bars = arr.map((b) => {
        const cls = b.status === 'none' ? 'none' : statusClass(b.status);
        const summary =
          b.status === 'none'
            ? 'No data'
            : `${b.up}/${b.total} up · ${b.avgMs}ms avg`;
        const tip = `${fmtTime(b.t)} · ${summary}`;
        return `<span class="bar ${cls}" title="${tip}"></span>`;
      });
      return `
        <div class="bars">${bars.join('')}</div>
        <div class="bars-foot">
          <span>${RANGE_EDGE_LABEL[rangeKey] ?? ''}</span>
          <span>${arr.length} buckets</span>
          <span>now</span>
        </div>
      `;
    }

    function renderCalendar(days) {
      if (!days || !days.length) return '';
      const cells = days.map((d) => {
        const cls = d.status === 'none' ? 'none' : statusClass(d.status);
        const pct =
          d.total > 0 ? ((d.up / d.total) * 100).toFixed(d.total > 100 ? 2 : 1) + '%' : 'no data';
        const tip = `${d.date} · ${pct}${d.total ? ' · ' + d.total + ' checks' : ''}`;
        return `<span class="day ${cls}" title="${tip}"></span>`;
      });
      return `
        <div class="calendar">${cells.join('')}</div>
        <div class="calendar-foot">
          <span>${days.length}d ago</span>
          <span>today</span>
        </div>
      `;
    }

    function renderTarget(target, series, rangeKey, calendar) {
      const cls = statusClass(target.status);
      const label = STATUS_LABEL[target.status] ?? '—';
      const latency = target.latencyMs != null ? target.latencyMs + ' ms' : '—';
      const code = target.statusCode ?? (target.error ? target.error : '—');
      const withData = (series ?? []).filter((b) => b.status !== 'none');
      const totalChecks = withData.reduce((s, b) => s + b.total, 0);
      const upChecks = withData.reduce((s, b) => s + b.up, 0);
      const uptime =
        totalChecks > 0
          ? ((upChecks / totalChecks) * 100).toFixed(totalChecks > 100 ? 2 : 1) + '%'
          : '—';
      return `
        <article class="card">
          <div class="card-head">
            <span class="card-name">${target.name}</span>
            <span class="status-chip ${cls}"><span class="dot"></span>${label}</span>
          </div>
          ${renderCalendar(calendar)}
          ${renderBars(series, rangeKey)}
          <div class="card-meta" style="margin-top:12px;justify-content:space-between">
            <span><strong>${uptime}</strong> uptime</span>
            <span><strong>${code}</strong></span>
            <span><strong>${latency}</strong></span>
            <span>checked ${fmtRel(target.checkedAt)}</span>
          </div>
        </article>
      `;
    }

    function renderBanner(targets) {
      const arr = Object.values(targets);
      const downCount = arr.filter((t) => t.status === 'down').length;
      const warnCount = arr.filter((t) => t.status === 'degraded' || t.status === 'warn').length;
      const dot = document.getElementById('bannerDot');
      const title = document.getElementById('bannerTitle');
      const sub = document.getElementById('bannerSub');
      dot.classList.remove('up', 'warn', 'down');
      if (downCount > 0) {
        dot.classList.add('down');
        title.textContent = downCount === arr.length ? 'Major outage' : 'Service disruption';
        sub.textContent = `${downCount} ${downCount === 1 ? 'service is' : 'services are'} down`;
      } else if (warnCount > 0) {
        dot.classList.add('warn');
        title.textContent = 'Degraded performance';
        sub.textContent = `${warnCount} ${warnCount === 1 ? 'service' : 'services'} responding unexpectedly`;
      } else {
        dot.classList.add('up');
        title.textContent = 'All systems operational';
        sub.textContent = `${arr.length} services checked`;
      }
    }

    const API = 'https://uptime-api.aplt.ai';
    const RANGE_KEY = 'autopilot-status-range';
    const VALID_RANGES = ['1h', '6h', '24h', '7d', '30d'];
    let currentRange =
      VALID_RANGES.includes(localStorage.getItem(RANGE_KEY))
        ? localStorage.getItem(RANGE_KEY)
        : '24h';

    function setActivePill(range) {
      document.querySelectorAll('.range-pill').forEach((el) => {
        el.classList.toggle('active', el.dataset.range === range);
      });
    }

    async function load() {
      let current = null;
      let series = null;
      let calendar = null;
      try {
        const [c, s, cal] = await Promise.all([
          fetch(`${API}/current`, { cache: 'no-store' }).then((r) => (r.ok ? r.json() : null)),
          fetch(`${API}/series?range=${currentRange}`, { cache: 'no-store' }).then((r) => (r.ok ? r.json() : null)),
          fetch(`${API}/calendar?days=90`, { cache: 'no-store' }).then((r) => (r.ok ? r.json() : null)),
        ]);
        current = c;
        series = s;
        calendar = cal;
      } catch (e) {
        // API unreachable
      }

      document.getElementById('rangeLabel').textContent = series?.label ?? '';

      const targetsEl = document.getElementById('targets');
      const allUnknown =
        current?.targets &&
        Object.values(current.targets).every((t) => t.status === 'unknown');

      const bannerDot = document.getElementById('bannerDot');
      bannerDot.classList.remove('up', 'warn', 'down');

      if (!current || !current.targets) {
        document.getElementById('bannerTitle').textContent = 'Status data unavailable';
        document.getElementById('bannerSub').textContent = 'Could not reach the uptime API. Retrying every 30 seconds.';
        bannerDot.classList.add('warn');
        targetsEl.innerHTML = '<div class="empty">Latest status data could not be loaded.</div>';
        return;
      }

      if (allUnknown) {
        document.getElementById('bannerTitle').textContent = 'Awaiting first check';
        document.getElementById('bannerSub').textContent = 'Cron fires every minute.';
        bannerDot.classList.add('warn');
        targetsEl.innerHTML = '<div class="empty">No data yet. Results will appear here within a minute.</div>';
        return;
      }

      renderBanner(current.targets);
      const seriesByTarget = series?.targets ?? {};
      const calendarByTarget = calendar?.targets ?? {};
      const html = Object.values(current.targets)
        .map((t) => renderTarget(t, seriesByTarget[t.id], currentRange, calendarByTarget[t.id]))
        .join('');
      targetsEl.innerHTML = html;
    }

    document.getElementById('rangePills').addEventListener('click', (e) => {
      const btn = e.target.closest('.range-pill');
      if (!btn) return;
      const r = btn.dataset.range;
      if (r === currentRange) return;
      currentRange = r;
      localStorage.setItem(RANGE_KEY, r);
      setActivePill(r);
      load();
    });

    setActivePill(currentRange);
    load();
    // Auto-refresh every 30s — checks land every minute on the worker.
    setInterval(load, 30_000);
  </script>
</body>
</html>
